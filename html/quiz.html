<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conexão Consciente - Quiz Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">
        <span>🧠</span> Conexão Consciente
      </a>
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="dashboard.html">🏠 Início</a>
        <a href="apoio.html">💚 Apoio</a>
        <a href="quiz.html" class="active">🎯 Quiz</a>
        <a href="chat.html">💬 Chat</a>
        <a href="conteudo.html">📚 Conteúdo</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">🌙</button>
        <div class="user-avatar" id="userAvatar">?</div>
        <button class="btn-logout" id="btnLogout">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <main class="container">
    <div class="quiz-container fade-in">

      <div class="quiz-header">
        <h2>🎯 Quiz: Segurança e Cidadania Digital</h2>
        <p style="color: var(--text-light);">Teste seus conhecimentos sobre como se proteger no mundo online.</p>
        <div class="quiz-progress">
          <div class="quiz-progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <p style="font-size:0.8rem; color:var(--text-light); margin-top:8px;">
          Pergunta <span id="currentQ">1</span> de <span id="totalQ">8</span>
        </p>
      </div>

      <!-- Área da pergunta -->
      <div class="card quiz-card" id="quizCard">
        <div class="question-number" id="questionLabel">Pergunta 1</div>
        <h3 id="questionText">Carregando...</h3>
        <div class="quiz-options" id="optionsContainer"></div>
        <div class="quiz-explanation" id="explanation"></div>
        <button class="btn btn-primary" id="btnNext" style="margin-top:20px; display:none;">
          Próxima →
        </button>
      </div>

      <!-- Resultado -->
      <div class="card quiz-result" id="quizResult">
        <div class="score-circle" id="scoreCircle">0</div>
        <h3 id="resultTitle">Parabéns!</h3>
        <p id="resultText">Você concluiu o quiz.</p>
        <button class="btn btn-primary" id="btnRestart">🔄 Fazer novamente</button>
        <a href="dashboard.html" class="btn btn-outline" style="margin-left:8px;">🏠 Voltar</a>
      </div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/quiz.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
