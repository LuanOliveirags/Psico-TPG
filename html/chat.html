<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conexão Consciente - Chat de Apoio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">
        <span>🧠</span> Conexão Consciente
      </a>
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="dashboard.html">🏠 Início</a>
        <a href="apoio.html">💚 Apoio</a>
        <a href="quiz.html">🎯 Quiz</a>
        <a href="chat.html" class="active">💬 Chat</a>
        <a href="conteudo.html">📚 Conteúdo</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">🌙</button>
        <div class="user-avatar" id="userAvatar">?</div>
        <button class="btn-logout" id="btnLogout">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CHAT -->
  <div class="chat-container">

    <!-- HEADER ESTILO WHATSAPP -->
    <div class="chat-header-wa">
      <div class="chat-header-avatar" id="chatAvatarIcon">💬</div>
      <div class="chat-header-text">
        <h3 id="chatTitle">Espaço de Escuta</h3>
        <span class="chat-header-sub">
          <span class="status-dot" id="chatStatusDot"></span>
          <span id="chatStatus">Online</span>
          <span id="chatSubtitle"></span>
        </span>
      </div>
      <div class="chat-header-right">
        <button class="btn-groups-pill" id="btnMyGroups" title="Minhas salas de grupo" style="display:none;">
          👥 <span class="group-badge" id="groupBadge">0</span>
        </button>
      </div>
    </div>

    <!-- BARRA DE AÇÕES (falar com especialista / voltar) -->
    <div class="chat-actions" id="chatActions">
      <button class="btn-chat-action" id="btnRequestHuman">
        🧑‍💼 Falar com Especialista
      </button>
      <button class="btn-chat-action btn-back-bot" id="btnBackToBot" style="display:none;">
        🤖 Voltar ao Assistente
      </button>
    </div>

    <!-- PAINEL DE GRUPOS -->
    <div class="group-rooms-panel" id="groupRoomsPanel" style="display:none;">
      <div class="group-rooms-header">
        <h4>👥 Salas de Grupo</h4>
        <button class="modal-close" id="btnCloseGroups">✕</button>
      </div>
      <div class="group-rooms-list" id="groupRoomsList">
        <p style="color:var(--text-light);font-size:0.85rem;padding:12px;">Carregando...</p>
      </div>
    </div>

    <!-- AVISO DE ESPERA -->
    <div class="chat-waiting" id="chatWaiting" style="display:none;">
      <div class="waiting-animation">
        <span class="spinner"></span>
      </div>
      <p>Aguardando um especialista disponível...</p>
      <button class="btn btn-outline btn-sm" id="btnCancelWait">Cancelar</button>
    </div>

    <!-- MENSAGENS -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Digite uma mensagem..." autocomplete="off">
      <button id="btnSend" title="Enviar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/chat.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
