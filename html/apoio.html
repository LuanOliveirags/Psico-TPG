<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conexão Consciente - Apoio Emocional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">
        <span>🧠</span> Conexão Consciente
      </a>
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="dashboard.html">🏠 Início</a>
        <a href="apoio.html" class="active">💚 Apoio</a>
        <a href="quiz.html">🎯 Quiz</a>
        <a href="chat.html">💬 Chat</a>
        <a href="conteudo.html">📚 Conteúdo</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">🌙</button>
        <div class="user-avatar" id="userAvatar">?</div>
        <button class="btn-logout" id="btnLogout">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <main class="container">
    <section class="emotion-section fade-in">
      <h2>Como você está se sentindo agora?</h2>
      <p>Escolha a emoção que melhor representa o seu momento. Não existe resposta certa ou errada.</p>

      <div class="emotion-grid" id="emotionGrid">
        <button class="emotion-btn" data-emotion="feliz" data-emoji="😄">
          <span class="emoji">😄</span>
          <span class="label">Feliz</span>
        </button>
        <button class="emotion-btn" data-emotion="calmo" data-emoji="😌">
          <span class="emoji">😌</span>
          <span class="label">Calmo(a)</span>
        </button>
        <button class="emotion-btn" data-emotion="ansioso" data-emoji="😰">
          <span class="emoji">😰</span>
          <span class="label">Ansioso(a)</span>
        </button>
        <button class="emotion-btn" data-emotion="triste" data-emoji="😢">
          <span class="emoji">😢</span>
          <span class="label">Triste</span>
        </button>
        <button class="emotion-btn" data-emotion="irritado" data-emoji="😤">
          <span class="emoji">😤</span>
          <span class="label">Irritado(a)</span>
        </button>
        <button class="emotion-btn" data-emotion="confuso" data-emoji="😵‍💫">
          <span class="emoji">😵‍💫</span>
          <span class="label">Confuso(a)</span>
        </button>
        <button class="emotion-btn" data-emotion="motivado" data-emoji="🔥">
          <span class="emoji">🔥</span>
          <span class="label">Motivado(a)</span>
        </button>
        <button class="emotion-btn" data-emotion="cansado" data-emoji="😴">
          <span class="emoji">😴</span>
          <span class="label">Cansado(a)</span>
        </button>
      </div>

      <!-- Resposta emocional -->
      <div class="card emotion-response" id="emotionResponse">
        <div class="msg-icon" id="responseIcon"></div>
        <h3 id="responseTitle"></h3>
        <p id="responseText"></p>
        <button class="btn btn-outline" style="margin-top: 16px;" id="btnSaveEmotion">
          💾 Salvar registro
        </button>
      </div>

      <!-- Histórico -->
      <div class="emotion-history" id="historySection" style="display:none;">
        <h3>📅 Seu histórico recente</h3>
        <div class="history-list" id="historyList"></div>
      </div>

    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/apoio.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
